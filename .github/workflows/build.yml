name: Build ModMenu dylib
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          cat > Tweak.m << 'EOF'
          #import <UIKit/UIKit.h>
          #import <objc/runtime.h>
          @interface AchoMenuViewController : UIViewController
          @end
          @implementation AchoMenuViewController
          - (void)viewDidLoad {
              [super viewDidLoad];
              CGFloat mw = self.view.bounds.size.width * 0.38;
              CGFloat rh = 44.0;
              NSArray *it = @[@"UNLIMITED AMMO",@"UNLIMITED AMMO 2",@"NO RECOIL",@"WALLSHOT",@"RAPID FIRE",@"TELEKILL",@"MASSKILL"];
              CGFloat hh = rh, th = hh + it.count * rh;
              UIView *ct = [[UIView alloc] initWithFrame:CGRectMake((self.view.bounds.size.width-mw)/2,(self.view.bounds.size.height-th)/2,mw,th)];
              ct.backgroundColor = [UIColor colorWithRed:0.48 green:0.48 blue:0.48 alpha:1.0];
              [self.view addSubview:ct];
              UIView *hd = [[UIView alloc] initWithFrame:CGRectMake(0,0,mw,hh)];
              hd.backgroundColor = [UIColor colorWithRed:0.094 green:0.094 blue:0.094 alpha:1.0];
              [ct addSubview:hd];
              UILabel *gr = [[UILabel alloc] initWithFrame:CGRectMake(12,0,30,hh)];
              gr.text=@"⚙"; gr.textColor=[UIColor whiteColor]; gr.font=[UIFont systemFontOfSize:18]; gr.textAlignment=NSTextAlignmentCenter;
              [hd addSubview:gr];
              UILabel *tl = [[UILabel alloc] initWithFrame:CGRectMake(0,0,mw,hh)];
              tl.text=@"BY ACHO PRODUCTION"; tl.textColor=[UIColor whiteColor]; tl.font=[UIFont boldSystemFontOfSize:13]; tl.textAlignment=NSTextAlignmentCenter;
              [hd addSubview:tl];
              for(int i=0;i<it.count;i++){
                  UIView *rw = [[UIView alloc] initWithFrame:CGRectMake(0,hh+i*rh,mw,rh)];
                  UILabel *lb = [[UILabel alloc] initWithFrame:CGRectMake(0,0,mw,rh)];
                  lb.text=it[i]; lb.textColor=[UIColor whiteColor]; lb.font=[UIFont boldSystemFontOfSize:14]; lb.textAlignment=NSTextAlignmentCenter;
                  [rw addSubview:lb];
                  if(i<it.count-1){ UIView *sp = [[UIView alloc] initWithFrame:CGRectMake(0,rh-0.5,mw,0.5)]; sp.backgroundColor=[UIColor colorWithRed:0.2 green:0.2 blue:0.2 alpha:1.0]; [rw addSubview:sp]; }
                  [ct addSubview:rw];
              }
              [self.view addGestureRecognizer:[[UITapGestureRecognizer alloc] initWithTarget:self action:@selector(close)]];
          }
          - (void)close { [self dismissViewControllerAnimated:NO completion:nil]; }
          + (void)show {
              dispatch_async(dispatch_get_main_queue(), ^{
                  AchoMenuViewController *m = [[AchoMenuViewController alloc] init];
                  m.view.backgroundColor = [UIColor colorWithWhite:0 alpha:0.5];
                  m.modalPresentationStyle = UIModalPresentationOverFullScreen;
                  UIViewController *r = [UIApplication sharedApplication].keyWindow.rootViewController;
                  if(r) [r presentViewController:m animated:NO completion:nil];
              });
          }
          @end
          @interface AchoButton : UIButton
          @end
          @implementation AchoButton { CGPoint sp; }
          - (instancetype)initWithFrame:(CGRect)f {
              self=[super initWithFrame:f];
              self.backgroundColor=[UIColor colorWithRed:0.95 green:0.1 blue:0.15 alpha:0.9];
              self.layer.cornerRadius=25; self.layer.borderWidth=2; self.layer.borderColor=[UIColor whiteColor].CGColor;
              [self setTitle:@"⚡" forState:UIControlStateNormal]; self.titleLabel.font=[UIFont systemFontOfSize:22];
              [self addGestureRecognizer:[[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(pan:)]];
              [self addTarget:self action:@selector(open) forControlEvents:UIControlEventTouchUpInside];
              return self;
          }
          - (void)pan:(UIPanGestureRecognizer *)g {
              UIView *sv=self.superview; if(!sv)return;
              if(g.state==UIGestureRecognizerStateBegan)sp=self.center;
              else if(g.state==UIGestureRecognizerStateChanged){CGPoint t=[g translationInView:sv];self.center=CGPointMake(sp.x+t.x,sp.y+t.y);}
              else if(g.state==UIGestureRecognizerStateEnded){CGFloat m=30,tx=(self.center.x<sv.bounds.size.width/2)?m:sv.bounds.size.width-m,ty=MAX(m,MIN(sv.bounds.size.height-m,self.center.y));[UIView animateWithDuration:0.3 delay:0 usingSpringWithDamping:0.7 initialSpringVelocity:0.5 options:0 animations:^{self.center=CGPointMake(tx,ty);} completion:nil];}
          }
          - (void)open { [AchoMenuViewController show]; }
          @end
          static void(*orig)(id,SEL);
          void hk(id s,SEL c){orig(s,c);static dispatch_once_t o;dispatch_once(&o,^{dispatch_after(dispatch_time(DISPATCH_TIME_NOW,2*NSEC_PER_SEC),dispatch_get_main_queue(),^{AchoButton*b=[[AchoButton alloc]initWithFrame:CGRectMake(15,100,50,50)];[[UIApplication sharedApplication].keyWindow addSubview:b];});});}
          __attribute__((constructor))static void init(){Method m=class_getInstanceMethod([UIViewController class],@selector(viewDidLoad));if(m){orig=(void*)method_getImplementation(m);method_setImplementation(m,(IMP)hk);}}
          EOF
          xcrun -sdk iphoneos clang -arch arm64 -miphoneos-version-min=14.0 -dynamiclib -framework UIKit -framework Foundation -framework CoreGraphics -framework QuartzCore -fobjc-arc -o ModMenu.dylib Tweak.m
          ls -la ModMenu.dylib
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ModMenu
          path: ModMenu.dylib
